name: Auto Approve & Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]
  status:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # 每天 UTC 零点运行

permissions:
  contents: write
  pull-requests: write
  checks: read
  actions: write

jobs:
  # Job 1: 定时批准 Dependabot PRs（原 auto-approve.yml）
  auto-approve:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@main

      - name: Setup Node.js
        uses: actions/setup-node@main
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install @octokit/rest

      - name: Auto-approve Dependabot PRs
        env:
          GITHUB_TOKEN: ${{ secrets.USER_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/auto-approve.js

  # Job 2: Dependabot PR 即时批准+直接合并
  dependabot-approve:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target' && github.actor == 'dependabot[bot]'
    steps:
      - name: Approve and merge dependabot PR
        uses: actions/github-script@main
        with:
          github-token: ${{ secrets.USER_PAT }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            // 批准 PR
            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number,
              event: 'APPROVE',
              body: '🤖 Dependabot PR auto-approved.'
            });
            console.log(`✅ PR #${pull_number} approved`);

            // 直接 squash merge（不依赖 auto-merge 仓库设置）
            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number,
                merge_method: 'squash'
              });
              console.log(`✅ PR #${pull_number} merged`);
            } catch (error) {
              console.log(`⏳ PR #${pull_number} not mergeable yet: ${error.message}`);
            }

  # Job 3: 事件驱动自动合并
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - name: Check and merge eligible PRs
        uses: actions/github-script@main
        with:
          github-token: ${{ secrets.USER_PAT }}
          script: |
            const { owner, repo } = context.repo;

            // 尝试从不同的事件类型中获取 PR 编号
            let pull_number = null;

            if (context.eventName === 'pull_request' || context.eventName === 'pull_request_review') {
              pull_number = context.payload.pull_request?.number || context.payload.number;
            } else if (context.eventName === 'workflow_dispatch') {
              console.log('Manual workflow dispatch - checking all open PRs');

              const { data: openPRs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                sort: 'updated',
                direction: 'desc'
              });

              console.log(`Found ${openPRs.length} open PRs`);

              const results = [];
              for (const pr of openPRs) {
                const prNumber = pr.number;
                console.log(`\n=== 检查 PR #${prNumber}: ${pr.title} ===`);

                const isDependabot = pr.user.login === 'dependabot[bot]';
                const hasAutoMergeLabel = pr.labels.some(label =>
                  ['auto-merge', 'automerge', '自动合并'].includes(label.name.toLowerCase())
                );
                const hasConflicts = pr.mergeable === false;

                console.log(`Dependabot: ${isDependabot}, Label: ${hasAutoMergeLabel}, Conflicts: ${hasConflicts}`);

                const shouldMerge = (isDependabot || hasAutoMergeLabel) && !hasConflicts;

                if (shouldMerge) {
                  try {
                    await github.rest.pulls.merge({
                      owner,
                      repo,
                      pull_number: prNumber,
                      merge_method: 'squash'
                    });
                    console.log(`✅ PR #${prNumber} merged`);
                    results.push({ pr: prNumber, status: 'merged', title: pr.title });
                  } catch (error) {
                    console.log(`❌ PR #${prNumber} merge failed: ${error.message}`);
                    results.push({ pr: prNumber, status: 'failed', title: pr.title, error: error.message });
                  }
                } else {
                  console.log(`⏭️ 跳过 PR #${prNumber}`);
                  results.push({ pr: prNumber, status: 'skipped', title: pr.title });
                }
              }

              console.log('\n=== 总结 ===');
              console.log(`已合并: ${results.filter(r => r.status === 'merged').length}`);
              console.log(`跳过: ${results.filter(r => r.status === 'skipped').length}`);
              console.log(`失败: ${results.filter(r => r.status === 'failed').length}`);
              return;
            } else if (context.eventName === 'check_suite' || context.eventName === 'status') {
              const commits = context.payload.check_suite?.head_sha ?
                [context.payload.check_suite.head_sha] :
                (context.payload.commits || []).map(c => c.sha);

              if (commits.length > 0) {
                const { data: prs } = await github.rest.pulls.list({
                  owner,
                  repo,
                  state: 'open'
                });

                for (const pr of prs) {
                  if (pr.head.sha && commits.includes(pr.head.sha)) {
                    pull_number = pr.number;
                    break;
                  }
                }
              }
            }

            if (!pull_number) {
              console.log('No PR found for event:', context.eventName);
              return;
            }

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });

            console.log(`检查 PR #${pull_number}: ${pr.title}`);

            const isDependabot = pr.user.login === 'dependabot[bot]';
            const hasAutoMergeLabel = pr.labels.some(label =>
              ['auto-merge', 'automerge', '自动合并'].includes(label.name.toLowerCase())
            );
            const hasConflicts = pr.mergeable === false;

            if ((isDependabot || hasAutoMergeLabel) && !hasConflicts) {
              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number,
                  merge_method: 'squash'
                });
                console.log(`✅ PR #${pull_number} merged`);
              } catch (error) {
                console.log(`⏳ PR #${pull_number} not mergeable yet: ${error.message}`);
              }
            } else {
              console.log(`⏭️ PR #${pull_number} 不满足自动合并条件`);
            }
